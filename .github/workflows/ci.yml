name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Lint with Ruff
  # ------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            lint-${{ runner.os }}-pip-

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (check)
        run: ruff check src/ tests/ scripts/ examples/ --output-format=github

      - name: Run ruff (format check)
        run: ruff format --check src/ tests/ scripts/ examples/

  # ------------------------------------------------------------------
  # Type-check with mypy
  # ------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: typecheck-${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            typecheck-${{ runner.os }}-pip-

      - name: Install package and type stubs
        run: |
          pip install -e ".[dev]"
          pip install mypy types-redis types-tqdm

      - name: Run mypy
        run: |
          mypy src/research_agent \
            --ignore-missing-imports \
            --no-strict-optional \
            --python-version 3.11

  # ------------------------------------------------------------------
  # Tests with pytest + coverage
  # ------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            test-${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install package with test extras
        run: pip install -e ".[dev,test]"

      - name: Run pytest with coverage
        env:
          # Provide dummy env vars so config.py doesn't raise
          ANTHROPIC_API_KEY: "test-key"
          OPENAI_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          MEMORY_BACKEND: "memory"
          CACHE_BACKEND: "memory"
        run: |
          pytest tests/ \
            --cov=research_agent \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v \
            --tb=short \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

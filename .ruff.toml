line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in default arguments (FastAPI pattern)
    "N806",   # variable in function should be lowercase (conflicts with Pydantic)
]

[lint.isort]
known-first-party = ["research_agent"]

[format]
quote-style = "double"
indent-style = "space"
